<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <!-- Left Section: Branding Panel -->
        <section class="brand-panel">
            <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lOa73zDEqO.svg" alt="Facebook" class="fb-logo">
            <h2>Facebook helps you connect and share with the people in your life.</h2>
        </section>

        <!-- Right Section: Interactive Authentication Card -->
        <section class="auth-panel">
            <div class="card shadow-box">
                <form action="#" method="POST" autocomplete="on">
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email address or phone number" aria-label="Email address or phone number" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" aria-label="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                    <div class="form-footer">
                        <a href="#" class="link-forgot">Forgotten password?</a>
                    </div>
                    <hr class="divider">
                    <div class="action-footer">
                        <button type="button" class="btn btn-success">Create new account</button>
                    </div>
                </form>
            </div>
            <p class="business-notice">
                <a href="#"><strong>Create a Page</strong></a> for a celebrity, brand or business.
            </p>
        </section>
    </main>

</body>
</html>
