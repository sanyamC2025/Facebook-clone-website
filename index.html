<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio - Facebook Clone Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <section class="brand-panel">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Facebook_Logo_%282019%29.svg" alt="Facebook" class="fb-logo">
            <h2>[Educational Clone] Connect and share with your network.</h2>
        </section>

        <section class="auth-panel">
            <div class="card shadow-box">
                <form action="#" method="POST" autocomplete="on">
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email address or phone number" aria-label="Email address or phone number" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" aria-label="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                    <div class="form-footer">
                        <a href="#" class="link-forgot">Forgotten password?</a>
                    </div>
                    <hr class="divider">
                    <div class="action-footer">
                        <button type="button" id="open-modal-btn" class="btn btn-success">Create new account</button>
                    </div>
                </form>
            </div>
            <p class="business-notice">
                <a href="#"><strong>Create a Page</strong></a> for a celebrity, brand or business.
            </p>
        </section>
    </main>

    <div class="modal-overlay" id="register-modal">
        <div class="modal-box shadow-box">
            <div class="modal-header">
                <div>
                    <h2>Create Educational Account</h2>
                    <p>It's quick and easy.</p>
                </div>
                <button type="button" class="close-modal-btn" id="close-modal-btn">&times;</button>
            </div>
            <hr class="divider">
            <form class="modal-form">
                <div class="input-row">
                    <input type="text" placeholder="First name" required>
                    <input type="text" placeholder="Surname" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Mobile number or email address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="New password" required>
                </div>
                <p class="terms-text">
                    People who use our service may have uploaded your contact information to Facebook.
                </p>
                <div class="action-footer">
                    <button type="submit" class="btn btn-success signup-submit-btn">Sign Up</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
